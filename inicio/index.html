/* ============================================================
   URU SPOT v2 — CSS COMPLETO CON TODAS LAS MEJORAS APLICADAS
   Plan Maestro Tier 1-4 ejecutado íntegramente
   ============================================================ */

:root {
  --void:#060605;--void2:#0d0d0b;--void3:#151513;--soil:#1c1b17;
  --parchment:#f2ede3;--parchment2:#e8e2d5;--parchment3:#faf8f3;
  --ink:#1a1916;
  --verde:#1d5c40;--verde2:#267a55;--verde3:#0e3326;
  --oro:#c4872a;--oro2:#dfa040;--oro3:#f2c060;
  --f-display:'DM Serif Display',Georgia,serif;
  --f-text:'DM Serif Text',Georgia,serif;
  --f-ui:'Syne',system-ui,sans-serif;
  --f-italic:'Instrument Serif',Georgia,serif;
  --ease:cubic-bezier(0.23,1,0.32,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --gutter:64px;
  --section-gap:120px;
  /* T1-05: tokens de sombra para depth system */
  --shadow-sm:0 2px 8px rgba(6,6,5,.18);
  --shadow-md:0 8px 32px rgba(6,6,5,.28);
  --shadow-lg:0 24px 72px -12px rgba(6,6,5,.40);
  --shadow-xl:0 36px 88px -12px rgba(6,6,5,.60);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--void);color:var(--parchment);font-family:var(--f-ui);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ── PROGRESS BAR ── */
#progress-bar{
  position:fixed;top:0;left:0;height:2px;width:0%;
  background:linear-gradient(90deg,var(--verde2),var(--oro2),var(--verde2));
  background-size:200% 100%;
  z-index:10000;transition:width 0.1s linear;
}
@media(min-width:769px){
  #progress-bar{overflow:hidden}
  #progress-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmerBar 2s linear infinite;pointer-events:none}
}
@keyframes shimmerBar{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
#grain{display:none}

/* ── FIX T2-06+T2-07: LIVE DOTS compositor-only (transform+opacity) ──
   Sin box-shadow: cero impacto en repaint. Contraste mejorado a .75 */
@keyframes rippleLive{
  0%{transform:scale(0.4);opacity:.75}
  65%{transform:scale(2.8);opacity:0}
  100%{transform:scale(2.8);opacity:0}
}
.live-dot,.rcard-open-dot,.uft-live-dot,.ubc-live-dot,.usb-live-dot{
  position:relative;border-radius:50%;flex-shrink:0
}
.live-dot::after,.rcard-open-dot::after,.uft-live-dot::after,.ubc-live-dot::after,.usb-live-dot::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:2px solid currentColor;opacity:0;
  animation:rippleLive 2.5s ease-out infinite;
  pointer-events:none;will-change:transform,opacity
}
.rcard-open.is-unverified .rcard-open-dot::after{display:none}
@media(prefers-reduced-motion:reduce){
  .live-dot::after,.rcard-open-dot::after,.uft-live-dot::after,.ubc-live-dot::after,.usb-live-dot::after{
    animation:none;display:none
  }
}

/* FIX T2-07: dotGlow sin box-shadow — usa filter */
@keyframes dotGlow{
  from{filter:drop-shadow(0 0 3px rgba(196,135,42,.5));opacity:.7}
  to{filter:drop-shadow(0 0 10px rgba(196,135,42,1));opacity:1}
}

/* ── HERO — PRIORIDAD ABSOLUTA ── */
.hero{
  position:relative;min-height:100svh;display:flex;flex-direction:column;
  overflow:hidden;background:var(--void)
}

/* Mesh: solo en desktop para no quemar GPU en móvil */
.hero-mesh{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 62% 72% at 78% 12%,rgba(29,92,64,.50) 0%,transparent 60%),
    radial-gradient(ellipse 45% 55% at 12% 88%,rgba(196,135,42,.18) 0%,transparent 58%),
    radial-gradient(ellipse 38% 45% at 52% 52%,rgba(29,92,64,.07) 0%,transparent 65%),
    linear-gradient(168deg,#060a07 0%,#060605 45%,#0a0800 100%)
}
/* T1-05: mesh pulse solo en desktop */
@media(min-width:769px){
  .hero-mesh::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 62% 72% at 78% 12%,rgba(29,92,64,.10) 0%,transparent 60%);
    animation:meshPulse 20s ease-in-out infinite alternate;pointer-events:none;opacity:0
  }
}
@keyframes meshPulse{from{opacity:0}to{opacity:1}}

/* Líneas decorativas */
.hero-lines{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.hero-lines::before{content:'';position:absolute;top:0;right:14%;width:1px;height:65%;background:linear-gradient(to bottom,transparent,rgba(196,135,42,.20) 30%,rgba(196,135,42,.08) 80%,transparent)}
.hero-lines::after{content:'';position:absolute;bottom:18%;left:0;width:42%;height:1px;background:linear-gradient(to right,transparent,rgba(29,92,64,.22) 40%,rgba(29,92,64,.08) 80%,transparent)}

/* Orbs: solo en desktop */
.hero-orb{position:absolute;border-radius:50%;pointer-events:none;z-index:1;contain:layout;overflow:hidden}
.hero-orb-1{width:700px;height:700px;top:-200px;right:-180px;background:radial-gradient(circle,rgba(29,92,64,.18) 0%,rgba(29,92,64,.05) 45%,transparent 70%)}
.hero-orb-2{width:500px;height:500px;bottom:-180px;left:-140px;background:radial-gradient(circle,rgba(196,135,42,.10) 0%,transparent 65%);contain:strict}
@media(min-width:769px){
  .hero-orb-1{animation:orbFloat1 14s ease-in-out infinite alternate;transform:translateZ(0)}
  .hero-orb-2{animation:orbFloat2 18s ease-in-out infinite alternate;transform:translateZ(0)}
}
@keyframes orbFloat1{from{transform:translate(0,0) scale(1)}to{transform:translate(-25px,30px) scale(1.08)}}
@keyframes orbFloat2{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,-20px) scale(1.12)}}

/* ── HERO TOPBAR ── */
.hero-topbar{
  position:relative;z-index:5;display:flex;align-items:center;
  justify-content:space-between;padding:36px var(--gutter);flex-shrink:0;
  /* Entrance animation T3: stagger */
  animation:heroTopbarIn .8s var(--ease) both
}
@keyframes heroTopbarIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.hero-topbar{animation:none}}

.city-tag{
  display:inline-flex;align-items:center;gap:12px;
  background:rgba(242,237,227,.08);border:1px solid rgba(242,237,227,.14);
  border-radius:2px;padding:10px 20px 10px 10px;
  transition:background .35s ease,border-color .35s ease
}
.city-tag:hover{background:rgba(242,237,227,.12);border-color:rgba(196,135,42,.30)}
@media(min-width:769px){
  @supports(backdrop-filter:blur(4px)){.city-tag{backdrop-filter:blur(4px)}}
}
.city-flag{width:32px;height:32px;border-radius:2px;background:linear-gradient(135deg,var(--verde),var(--oro));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.city-name{font-family:var(--f-ui);font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(242,237,227,.90);display:block;line-height:1}
.city-sub{font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(242,237,227,.32);display:block;margin-top:3px}

/* Logo — Tier 3: 120px en desktop */
.hero-logo{display:flex;align-items:center}
.hero-logo img{
  width:auto;max-width:120px;height:auto;
  filter:drop-shadow(0 4px 20px rgba(0,0,0,.75)) brightness(1.15);
  transition:transform 0.5s var(--ease),filter .5s ease
}
.hero-logo img:hover{transform:scale(1.06);filter:drop-shadow(0 6px 28px rgba(196,135,42,.40)) brightness(1.25)}

/* ── HERO INNER ── */
.hero-inner{
  position:relative;z-index:4;padding:0 var(--gutter) 100px;flex:1;
  display:flex;flex-direction:row;align-items:flex-end;justify-content:space-between;gap:48px
}
.hero-inner-left{
  flex:1;min-width:0;display:flex;flex-direction:column;justify-content:flex-end;
  /* Stagger entrance */
  animation:heroContentIn 1s .15s var(--ease) both
}
@keyframes heroContentIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.hero-inner-left{animation:none}}

/* ── LIVE CHIP ── */
.live-chip{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(29,92,64,.14);border:1px solid rgba(29,92,64,.40);
  border-radius:2px;padding:9px 18px;font-size:8px;font-weight:700;
  letter-spacing:3.5px;text-transform:uppercase;color:rgba(100,210,155,.90);
  margin-bottom:32px;width:fit-content;
  animation:liveChipIn .6s .4s var(--ease) both
}
@keyframes liveChipIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@media(prefers-reduced-motion:reduce){.live-chip{animation:none}}
.live-dot{width:6px;height:6px;background:#64d29b;color:#64d29b}

/* ── HERO TITLE — FIX line-height 0.87→0.92 para evitar corte de tildes ── */
.hero-title{
  font-family:var(--f-display);
  font-size:clamp(54px,9vw,116px);
  line-height:.92;  /* FIX P1-UI-03: era 0.87, cortaba la tilde de "Concepción" */
  letter-spacing:-3px;color:var(--parchment);
  margin-bottom:36px;display:block
}
.hero-title .eyebrow{
  font-family:var(--f-italic);font-style:italic;
  font-size:clamp(13px,1.8vw,21px);font-weight:400;letter-spacing:7px;
  color:rgba(242,237,227,.38);display:block;margin-bottom:20px;line-height:1
}
.hero-title .main-line{display:block;overflow:visible}
/* FIX P1-UI-04: fallback sólido en prefers-reduced-motion */
.hero-title .main-line em{
  font-style:italic;
  background:linear-gradient(100deg,rgba(242,237,227,.95) 0%,rgba(242,192,96,.95) 25%,rgba(255,255,255,1) 50%,rgba(242,192,96,.95) 75%,rgba(196,135,42,.90) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:300% 100%;
  animation:luxuryShimmer 5s ease infinite
}
@media(prefers-reduced-motion:reduce){
  .hero-title .main-line em{
    -webkit-text-fill-color:var(--parchment);
    background:none;animation:none
  }
}
@keyframes luxuryShimmer{0%{background-position:100% 50%}50%{background-position:0% 50%}100%{background-position:100% 50%}}

/* ── HERO RULE ── */
.hero-rule{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.hero-rule-line{height:1px;width:56px;background:linear-gradient(90deg,var(--oro2),transparent);flex-shrink:0}
.hero-rule-dot{width:5px;height:5px;background:var(--oro2);border-radius:50%;animation:dotGlow 2.5s ease-in-out infinite alternate}

/* ── HERO SUB ── */
.hero-sub{
  font-family:var(--f-italic);font-style:italic;font-size:17px;
  line-height:1.95;color:rgba(242,237,227,.45);max-width:540px;margin-bottom:52px
}
.hero-sub strong{font-style:normal;color:rgba(242,237,227,.82);font-weight:400}

/* ── STATS STRIP ── */
.stats-strip{
  display:flex;align-items:stretch;margin-bottom:52px;width:fit-content;max-width:100%;
  border:1px solid rgba(242,237,227,.09);border-radius:2px;overflow:hidden;
  background:rgba(242,237,227,.03);
  animation:statsIn .8s .55s var(--ease) both
}
@keyframes statsIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.stats-strip{animation:none}}
@media(min-width:769px){
  @supports(backdrop-filter:blur(12px)){.stats-strip{backdrop-filter:blur(12px)}}
}
.stat{display:flex;flex-direction:column;gap:7px;padding:22px 34px;transition:background 0.4s ease;cursor:default}
.stat:hover{background:rgba(196,135,42,.08)}
.stat+.stat{border-left:1px solid rgba(242,237,227,.09)}
.stat-num{font-family:var(--f-display);font-size:36px;line-height:1;color:var(--parchment)}
.stat-num sup{font-size:18px;color:var(--oro2);vertical-align:super}
.stat-label{font-size:8px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(242,237,227,.30);font-weight:600}

/* ── HERO CTAs ── */
.hero-ctas{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.btn-primary{
  display:inline-flex;align-items:center;gap:12px;background:var(--verde);color:#fff;
  font-family:var(--f-ui);font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  padding:18px 40px;border-radius:2px;
  transition:background .4s var(--ease),transform .4s var(--ease),box-shadow .4s ease;
  box-shadow:0 8px 40px rgba(29,92,64,.50);position:relative;overflow:hidden
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  transform:translateX(-100%);transition:transform .5s var(--ease)
}
.btn-primary:hover::after{transform:translateX(100%)}
.btn-primary:hover{background:var(--verde2);transform:translateY(-4px);box-shadow:0 24px 60px rgba(29,92,64,.65)}

.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--f-italic);font-style:italic;font-size:15px;
  color:rgba(242,237,227,.38);transition:color .35s ease,gap .35s var(--ease);
  border-bottom:1px solid transparent;padding-bottom:2px
}
.btn-ghost:hover{color:rgba(242,237,227,.82);border-bottom-color:rgba(242,237,227,.25);gap:14px}

.hero-fade{position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(to bottom,transparent,rgba(6,6,5,.70));z-index:3;pointer-events:none}

/* ── WIDGET CLIMA — FIX P1-UI-01: reducido y reposicionado ── */
.wx-hero{
  flex-shrink:0;width:240px;align-self:center;position:relative;z-index:4;
  animation:wxIn .9s .3s var(--ease) both
}
@keyframes wxIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@media(prefers-reduced-motion:reduce){.wx-hero{animation:none}}
.wx-hero-card{
  background:rgba(8,8,6,.92);border:1px solid rgba(242,237,227,.12);
  border-radius:4px;overflow:hidden;transition:border-color .4s ease,box-shadow .4s ease,transform .4s var(--ease)
}
.wx-hero-card:hover{border-color:rgba(196,135,42,.32);box-shadow:0 20px 60px rgba(0,0,0,.55);transform:translateY(-3px)}
@media(min-width:769px){
  @supports(backdrop-filter:blur(24px)){
    .wx-hero-card{backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%)}
  }
}
.wx-hero-bar{height:2px;background:rgba(196,135,42,.20);overflow:hidden;position:relative}
@media(min-width:769px){
  .wx-hero-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(196,135,42,.65) 30%,rgba(242,192,96,.95) 50%,rgba(196,135,42,.65) 70%,transparent);animation:shimmerBar 3s ease infinite;pointer-events:none}
}
.wx-hero-body{padding:18px 20px 14px}
.wx-hero-city{font-family:var(--f-ui);font-size:7px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(242,237,227,.38);display:flex;align-items:center;gap:6px;margin-bottom:14px}
.wx-hero-city::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--oro2);flex-shrink:0}
.wx-hero-main{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.wx-hero-icon{font-size:38px;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 12px rgba(0,0,0,.5))}
@media(min-width:769px){.wx-hero-icon{animation:wx-iconFloat 4s ease-in-out infinite alternate}}
@keyframes wx-iconFloat{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.wx-hero-temp-wrap{display:flex;flex-direction:column;gap:2px}
.wx-hero-temp{font-family:var(--f-display);font-size:44px;line-height:1;color:var(--parchment);letter-spacing:-2px;display:flex;align-items:flex-start;min-height:52px}
.wx-hero-temp sup{font-family:var(--f-ui);font-size:16px;font-weight:700;color:var(--oro2);margin-top:6px;letter-spacing:0}
.wx-hero-desc{font-family:var(--f-italic);font-style:italic;font-size:12px;color:rgba(242,237,227,.58);line-height:1.3;min-height:18px}
.wx-hero-sep{height:1px;background:rgba(242,237,227,.08);margin:12px 0}
.wx-hero-data{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wx-hero-datum{display:flex;flex-direction:column;gap:3px}
.wx-hero-datum-label{font-family:var(--f-ui);font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(242,237,227,.24)}
.wx-hero-datum-val{font-family:var(--f-ui);font-size:12px;font-weight:700;color:rgba(242,237,227,.82);letter-spacing:.3px;min-height:20px;display:block}
.wx-hero-footer{padding:8px 20px 12px;border-top:1px solid rgba(242,237,227,.06);display:flex;align-items:center;justify-content:space-between}
.wx-hero-updated{font-family:var(--f-ui);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(242,237,227,.20);min-height:14px;display:block}
.wx-hero-frase{font-family:var(--f-italic);font-style:italic;font-size:9px;color:rgba(196,135,42,.65);text-align:right;max-width:110px;line-height:1.4;min-height:14px;display:block}
.wx-skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:wx-skel 1.4s linear infinite;border-radius:2px}
@keyframes wx-skel{0%{background-position:200% 50%}100%{background-position:-200% 50%}}
@media(prefers-reduced-motion:reduce){.wx-skeleton{animation:none;background:rgba(255,255,255,.05)}}
.wx-skel-temp{height:44px;width:100px;margin-bottom:6px}
.wx-skel-desc{height:14px;width:90px}
.wx-skel-datum{height:18px;width:55px}
#wx-hero-temp{min-height:52px;display:flex;align-items:flex-start}
#wx-hero-desc{min-height:18px}
#wx-hero-feels,#wx-hero-hum,#wx-hero-wind,#wx-hero-rain{min-height:20px;display:block}
#wx-hero-updated{min-height:14px;display:block}
#wx-hero-frase{min-height:14px;display:block}

/* ── TICKER — FIX P2-UX-06: no hardcodea estados de apertura ── */
.hero-ticker{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  height:46px;border-top:1px solid rgba(196,135,42,.18);
  background:linear-gradient(90deg,rgba(6,6,5,.88),rgba(20,14,4,.92),rgba(6,6,5,.88));
  overflow:hidden;display:block;white-space:nowrap;line-height:46px
}
#heroTickerInner{display:inline-flex;align-items:center;white-space:nowrap;will-change:transform;min-width:200%}
@media(min-width:769px){
  @supports(backdrop-filter:blur(8px)){.hero-ticker{backdrop-filter:blur(8px)}}
}
/* FIX P4-AC-02: ticker aria-hidden para screen readers */
.htick-pause{
  position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:7;
  width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.35);
  border:1px solid rgba(242,237,227,.20);color:rgba(242,237,227,.78);
  display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;
  transition:background .25s ease,border-color .25s ease
}
.htick-pause:hover{background:rgba(196,135,42,.28);border-color:rgba(196,135,42,.50)}
#heroTickerInner{padding-left:40px}
.htick-item{
  font-family:var(--f-ui);font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;
  /* FIX P4-AC-05: contraste mejorado de .45 a .68 → supera 4.5:1 */
  color:rgba(242,237,227,.68);
  display:inline-flex;align-items:center;gap:8px;padding:0 24px;transition:color .3s ease
}
.htick-item:hover{color:var(--oro2)}
.htick-sep{color:var(--oro2);font-size:10px;flex-shrink:0;opacity:.40;letter-spacing:2px}
.htick-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.htick-green{background:#64d29b}.htick-oro{background:var(--oro2)}.htick-red{background:#e74c3c}
@media(max-width:640px){.hero-ticker{display:none}}

/* ── NAV — FIX P1-UI-06 + P1-UI-07 ── */
.main-nav{
  position:sticky;top:0;z-index:900;
  background:rgba(10,10,9,.96);border-bottom:1px solid rgba(242,237,227,.09);
  display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  /* FIX P1-UI-07: relative para el indicator */
  position:sticky
}
.main-nav::-webkit-scrollbar{display:none}
/* Indicator: FIX P1-UI-06 — inicializa invisible hasta que JS lo posiciona */
.nav-indicator{
  position:absolute;bottom:0;height:2px;
  background:linear-gradient(90deg,var(--verde),var(--oro2));
  transition:left .4s var(--ease),width .4s var(--ease);
  pointer-events:none;z-index:10;
  opacity:0;transition:left .4s var(--ease),width .4s var(--ease),opacity .3s ease
}
.nav-indicator.ready{opacity:1}
.main-nav.scrolled{background:rgba(6,6,5,.98);box-shadow:0 4px 40px rgba(0,0,0,.55)}
.nav-item{
  display:inline-flex;align-items:center;gap:8px;padding:0 24px;height:60px;
  font-family:var(--f-ui);font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:rgba(242,237,227,.40);white-space:nowrap;flex-shrink:0;
  border-bottom:2px solid transparent;transition:color .3s ease,border-color .3s ease
}
.nav-item:hover,.nav-item.active{color:var(--parchment);border-bottom-color:var(--verde2)}
.nav-item:focus-visible{color:var(--parchment);border-bottom-color:var(--oro2);outline:2px solid rgba(196,135,42,.60);outline-offset:-2px}
.nav-item .nav-emoji{font-size:14px;transition:transform .3s var(--ease)}
.nav-item:hover .nav-emoji{transform:scale(1.2) rotate(-4deg)}
.nav-divider{width:1px;margin:16px 0;background:rgba(242,237,227,.08);flex-shrink:0}

/* ── FIX P1-UI-07: SECTION CRUMB — top correcto para no solapar con search ── */
.section-crumb{
  position:sticky;
  /* FIX: el crumb va debajo del nav (60px), la search va a top:60px también
     Usamos un stack diferente: crumb a top:61px, z:840 < search z:800 no aplica
     CORRECCIÓN: crumb visible solo cuando search está cerrada */
  top:60px;z-index:840;
  background:rgba(242,237,227,.98);border-bottom:1px solid rgba(26,25,22,.09);
  padding:10px var(--gutter);font-family:var(--f-ui);font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:rgba(26,25,22,.48);
  display:flex;align-items:center;gap:8px;
  transform:translateY(-100%);transition:transform .3s var(--ease);pointer-events:none
}
.section-crumb.visible{transform:translateY(0)}
.section-crumb.search-active{display:none}
.section-crumb-dot{width:5px;height:5px;border-radius:50%;background:var(--verde);flex-shrink:0}
.section-crumb-current{color:var(--ink)}
@media(max-width:640px){.section-crumb{display:none}}

/* ── BUSCADOR — FIX: top:60px, crumb se oculta cuando open ── */
.search-bar-wrap{
  position:sticky;top:60px;z-index:800;
  background:rgba(6,6,5,.98);border-bottom:1px solid rgba(242,237,227,.08);
  padding:0 var(--gutter);display:flex;align-items:center;gap:16px;
  height:0;overflow:hidden;transition:height .35s var(--ease)
}
.search-bar-wrap.open{height:72px}
.search-icon-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:44px;height:44px;border:none;background:none;cursor:pointer;
  color:rgba(242,237,227,.58);font-size:18px;flex-shrink:0;
  transition:color .3s ease,transform .3s var(--ease);padding:0;margin-left:auto
}
.search-icon-btn:hover{color:var(--oro2);transform:scale(1.1)}
.search-input{
  flex:1;background:rgba(242,237,227,.06);border:1px solid rgba(242,237,227,.14);
  border-radius:2px;padding:14px 20px;font-family:var(--f-ui);font-size:13px;
  font-weight:600;letter-spacing:.5px;color:var(--parchment);outline:none;
  transition:border-color .3s ease,background .3s ease,box-shadow .3s ease
}
.search-input::placeholder{color:rgba(242,237,227,.30);font-weight:400}
.search-input:focus{border-color:var(--oro2);background:rgba(242,237,227,.09);box-shadow:0 0 0 3px rgba(196,135,42,.14),0 0 30px rgba(196,135,42,.08)}
.search-close{background:none;border:none;color:rgba(242,237,227,.38);font-size:20px;cursor:pointer;padding:8px;transition:color .3s ease,transform .3s var(--ease);flex-shrink:0;line-height:1}
.search-close:hover{color:var(--parchment);transform:rotate(90deg)}
.search-count{font-family:var(--f-ui);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(242,237,227,.30);white-space:nowrap;flex-shrink:0;min-width:80px;text-align:right}
.search-highlight{background:rgba(196,135,42,.38);border-radius:2px;padding:0 2px}
.search-hidden{display:none!important}
.search-no-results{display:none;text-align:center;padding:60px 24px;font-family:var(--f-italic);font-style:italic;font-size:18px;color:rgba(26,25,22,.40)}
.search-no-results.visible{display:block}

/* FIX P2-UX-05: mensaje global sin resultados */
.search-global-empty{
  display:none;text-align:center;padding:80px 24px 60px;
  font-family:var(--f-italic);font-style:italic;font-size:20px;color:rgba(26,25,22,.45)
}
.search-global-empty.visible{display:block}
.search-global-empty strong{font-style:normal;color:var(--verde);font-weight:400}

/* ── MAIN BODY ── */
.main-body{background:var(--parchment3);padding:100px var(--gutter) 120px;position:relative}
.main-body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 0%,rgba(29,92,64,.05) 0%,transparent 45%),radial-gradient(circle at 85% 100%,rgba(196,135,42,.05) 0%,transparent 40%);pointer-events:none}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:60px;padding-bottom:24px;position:relative;gap:16px;flex-wrap:wrap}
.section-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(26,25,22,.12)}
.section-header-accent{position:absolute;bottom:-1px;left:0;display:flex;height:3px}
.section-header-accent span:nth-child(1){display:block;width:80px;height:3px;background:var(--verde)}
.section-header-accent span:nth-child(2){display:block;width:32px;height:3px;background:var(--oro)}
.section-header-accent span:nth-child(3){display:block;width:12px;height:3px;background:var(--parchment2);opacity:.4}
.section-eyebrow{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--verde);display:block;margin-bottom:8px}
.section-title{font-family:var(--f-display);font-size:clamp(24px,3.2vw,34px);font-weight:400;color:var(--ink);line-height:1;letter-spacing:-.5px}
.section-count{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--parchment);font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:8px 16px;border-radius:2px;white-space:nowrap;flex-shrink:0}

/* FIX P4-PE-06: contain-intrinsic-size corregidos a valores reales */
.us-section{margin-top:var(--section-gap);content-visibility:auto}
#restaurantes{contain-intrinsic-size:auto 3700px}
#cafes{contain-intrinsic-size:auto 900px}
#bares{contain-intrinsic-size:auto 600px}
#panaderias{contain-intrinsic-size:auto 700px}
#heladerias{contain-intrinsic-size:auto 600px}
#hosterias{contain-intrinsic-size:auto 700px}
#gimnasios{contain-intrinsic-size:auto 900px}
.uft-wrap,.ubc-wrap,.usb-wrap{contain:layout style}

/* ── REVEAL SYSTEM ── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-28px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(.96);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.reveal-scale.visible{opacity:1;transform:scale(1)}
@media(prefers-reduced-motion:reduce){
  .reveal,.reveal-left,.reveal-scale{opacity:1;transform:none;transition:none}
}

/* ── MOOD PICKER ── */
.mood-wrap{width:100%;margin:0 0 80px 0;display:block;position:relative}
.mood-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;position:relative;gap:16px;flex-wrap:wrap}
.mood-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(26,25,22,.12)}
.mood-hdr-accent{position:absolute;bottom:-1px;left:0;display:flex;height:3px}
.mood-hdr-accent span:nth-child(1){display:block;width:80px;height:3px;background:var(--verde)}
.mood-hdr-accent span:nth-child(2){display:block;width:32px;height:3px;background:var(--oro)}
.mood-hdr-accent span:nth-child(3){display:block;width:12px;height:3px;background:var(--parchment2);opacity:.4}
.mood-eyebrow{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--verde);display:block;margin-bottom:8px}
.mood-title{font-family:var(--f-display);font-size:clamp(24px,3.2vw,34px);font-weight:400;color:var(--ink);line-height:1;letter-spacing:-.5px}
.mood-card{
  background:var(--ink);border-radius:4px;position:relative;overflow:hidden;
  padding:40px 44px;box-shadow:var(--shadow-lg);
  border:1px solid rgba(242,237,227,.06);
  transition:box-shadow .4s ease,border-color .4s ease
}
.mood-card:hover{box-shadow:var(--shadow-xl);border-color:rgba(196,135,42,.14)}
.mood-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 90% at 95% 10%,rgba(29,92,64,.22) 0%,transparent 62%),radial-gradient(ellipse 40% 70% at 5% 90%,rgba(196,135,42,.12) 0%,transparent 58%);pointer-events:none;z-index:0}
.mood-suggest{
  position:relative;z-index:1;display:inline-flex;align-items:center;gap:10px;
  background:rgba(196,135,42,.12);border:1px solid rgba(196,135,42,.36);border-radius:2px;
  padding:9px 18px;font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--oro2);margin-bottom:24px;min-height:34px;
  transition:background .3s ease
}
.mood-suggest-dot{width:6px;height:6px;border-radius:50%;background:var(--oro2);flex-shrink:0;animation:dotGlow 2.5s ease-in-out infinite alternate}
.mood-question{position:relative;z-index:1;font-family:var(--f-display);font-style:italic;font-size:clamp(20px,3vw,30px);color:var(--parchment);line-height:1.2;margin-bottom:30px;display:block}
.mood-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* Mood buttons — stagger delay en reveal */
.mood-btn{
  background:rgba(242,237,227,.04);border:1px solid rgba(242,237,227,.12);border-radius:3px;
  padding:24px 18px 20px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;
  cursor:pointer;text-align:left;
  transition:background .3s ease,border-color .3s ease,transform .35s var(--ease),box-shadow .35s ease;
  font-family:inherit;color:inherit;position:relative;overflow:hidden
}
.mood-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(196,135,42,.10),transparent 60%);opacity:0;transition:opacity .3s ease}
.mood-btn:hover::after{opacity:1}
.mood-btn:hover{background:rgba(196,135,42,.08);border-color:rgba(196,135,42,.42);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.25)}
.mood-btn:focus-visible{background:rgba(196,135,42,.10);border-color:var(--oro2);outline:none}
.mood-btn.active{background:rgba(29,92,64,.16);border-color:var(--verde2);transform:translateY(-2px)}
.mood-btn.suggested{box-shadow:0 0 0 1px rgba(196,135,42,.48)}
.mood-btn-icon{font-size:28px;line-height:1;transition:transform .4s var(--ease-spring)}
.mood-btn:hover .mood-btn-icon{transform:scale(1.2) rotate(-5deg)}
.mood-btn.active .mood-btn-icon{transform:scale(1.1)}
.mood-btn-label{font-family:var(--f-display);font-style:italic;font-size:16px;color:var(--parchment);line-height:1.2;position:relative;z-index:1}
.mood-btn-sub{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(242,237,227,.32);position:relative;z-index:1}

.mood-result{position:relative;z-index:1;margin-top:0;max-height:0;overflow:hidden;transition:max-height .5s var(--ease),margin-top .5s var(--ease)}
.mood-result.open{max-height:800px;margin-top:28px}
.mood-result-inner{border-top:1px solid rgba(242,237,227,.08);padding-top:24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.mood-result-hint{width:100%;font-family:var(--f-italic);font-style:italic;font-size:13px;color:rgba(242,237,227,.42);margin-bottom:6px}
.mood-result-chip{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(242,237,227,.05);border:1px solid rgba(242,237,227,.14);border-radius:2px;
  padding:10px 16px;font-family:var(--f-ui);font-size:10px;font-weight:700;letter-spacing:1px;
  color:rgba(242,237,227,.78);text-decoration:none;
  transition:background .3s ease,border-color .3s ease,transform .3s var(--ease)
}
.mood-result-chip:hover{background:rgba(196,135,42,.12);border-color:var(--oro2);color:var(--parchment);transform:translateY(-2px)}
.mood-result-clear{
  margin-left:auto;background:none;border:1px solid rgba(242,237,227,.20);
  color:rgba(242,237,227,.48);font-family:var(--f-ui);font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;padding:9px 14px;border-radius:2px;
  cursor:pointer;transition:border-color .25s ease,color .25s ease
}
.mood-result-clear:hover{border-color:rgba(242,237,227,.45);color:var(--parchment)}
@media(max-width:860px){.mood-grid{grid-template-columns:repeat(2,1fr)}.mood-card{padding:30px 26px}}
@media(max-width:640px){.mood-card{padding:26px 20px}.mood-question{font-size:19px;margin-bottom:20px}}

/* ── GLOSARIO ── */
.glos-wrap{width:100%;margin:0 0 64px 0}
.glos-toggle{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(26,25,22,.05);border:1px solid rgba(26,25,22,.14);border-radius:2px;
  padding:14px 22px;font-family:var(--f-ui);font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);cursor:pointer;
  transition:background .3s ease,border-color .3s ease;width:100%;justify-content:space-between
}
.glos-toggle:hover{background:rgba(29,92,64,.06);border-color:var(--verde2)}
.glos-toggle-arrow{transition:transform .3s var(--ease);font-size:12px;color:rgba(26,25,22,.42)}
.glos-toggle.open .glos-toggle-arrow{transform:rotate(180deg)}
/* FIX P2-UX-09: animación en glosario consistente con acordeones */
.glos-body{max-height:0;overflow:hidden;transition:max-height .45s var(--ease)}
.glos-body.open{max-height:500px}
.glos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(26,25,22,.08);border:1px solid rgba(26,25,22,.08);margin-top:1px}
.glos-item{background:#fff;padding:20px 22px;display:flex;flex-direction:column;gap:6px;transition:background .3s ease}
.glos-item:hover{background:rgba(29,92,64,.04)}
.glos-item-sym{font-family:var(--f-display);font-style:italic;font-size:18px;color:var(--verde)}
.glos-item-desc{font-family:var(--f-italic);font-style:italic;font-size:12.5px;color:rgba(26,25,22,.58);line-height:1.55}
@media(max-width:860px){.glos-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.glos-grid{grid-template-columns:1fr}}

/* ── TOOLTIPS — FIX P4-AC-03 ── */
.pill[data-tip]{position:relative;cursor:help}
.pill[data-tip]::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%) translateY(4px);
  background:var(--ink);color:var(--parchment);font-family:var(--f-ui);font-size:9px;
  font-weight:600;letter-spacing:.3px;text-transform:none;padding:8px 12px;border-radius:3px;
  white-space:nowrap;opacity:0;visibility:hidden;
  transition:opacity .25s ease,transform .25s ease;z-index:50;
  box-shadow:0 8px 24px rgba(0,0,0,.38);pointer-events:none
}
.pill[data-tip]::before{content:'';position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink);opacity:0;visibility:hidden;transition:opacity .25s ease;z-index:50;pointer-events:none}
.pill[data-tip]:hover::after,.pill[data-tip]:focus::after{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.pill[data-tip]:hover::before,.pill[data-tip]:focus::before{opacity:1;visibility:visible}
@media(max-width:768px){.pill[data-tip]::after,.pill[data-tip]::before{display:none}}

/* ── CAT GRID ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(26,25,22,.10);border:1px solid rgba(26,25,22,.10)}
.cat-card{
  background:var(--ink);display:flex;flex-direction:column;align-items:flex-start;
  justify-content:flex-end;padding:36px 32px 32px;text-decoration:none;position:relative;
  overflow:hidden;min-height:200px;
  transition:transform .4s var(--ease),box-shadow .4s ease;contain:layout style
}
.cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(29,92,64,.28) 0%,transparent 60%);opacity:0;transition:opacity .4s ease}
.cat-card:hover::before,.cat-card:focus-visible::before{opacity:1}
.cat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--verde),var(--oro));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease)}
.cat-card:hover::after,.cat-card:focus-visible::after{transform:scaleX(1)}
.cat-card:hover,.cat-card:focus-visible{transform:translateY(-6px);box-shadow:0 28px 64px -10px rgba(6,6,5,.65)}
.cat-card-bg{position:absolute;inset:0;opacity:.12;transition:opacity .4s ease,transform .6s var(--ease);font-size:120px;display:flex;align-items:center;justify-content:center;line-height:1;filter:blur(2px);pointer-events:none}
.cat-card:hover .cat-card-bg{opacity:.22;transform:scale(1.10)}
.cat-card-content{position:relative;z-index:2}
.cat-card-emoji{font-size:32px;display:block;margin-bottom:16px;transition:transform .4s var(--ease-spring)}
.cat-card:hover .cat-card-emoji{transform:scale(1.18) rotate(-6deg)}
.cat-card-title{font-family:var(--f-display);font-style:italic;font-size:22px;color:var(--parchment);display:block;line-height:1.1;letter-spacing:-.3px;margin-bottom:8px}
.cat-card-sub{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(242,237,227,.38)}
.cat-card-arrow{
  position:absolute;top:24px;right:24px;width:36px;height:36px;

/* ── GYM GRID ── */
.gym-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(26,25,22,.10);border:1px solid rgba(26,25,22,.10)}
.gcard{

  text-decoration:none;position:relative;overflow:hidden;min-height:180px;

  contain:layout style
}
.gcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--verde);transform:scaleX(0);transform-origin:left;transition:transform .35s var(--ease);z-index:0}

.gcard-feat{grid-column:span 2;background:var(--ink);color:var(--parchment);padding:44px 40px 38px;min-height:220px;position:relative;overflow:hidden}

.gcard-feat::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 75% at 92% 18%,rgba(29,92,64,.30) 0%,transparent 58%),radial-gradient(ellipse 45% 55% at 8% 82%,rgba(196,135,42,.14) 0%,transparent 55%);pointer-events:none;z-index:1}

.gcard-content{position:relative;z-index:2;display:flex;flex-direction:column;gap:13px;height:100%}
.gcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.gcard-score{display:inline-flex;align-items:center;gap:6px;background:rgba(196,135,42,.12);border:1px solid rgba(196,135,42,.35);border-radius:2px;color:var(--oro);font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;padding:5px 10px}
.gcard-icon{font-size:34px;line-height:1;transition:transform .4s var(--ease-spring)}

.gcard-feat .gcard-icon{font-size:48px}
.gcard-name{font-family:var(--f-display);font-size:20px;line-height:1.1;color:var(--ink);letter-spacing:-.3px;display:block;word-break:break-word}
.gcard-feat .gcard-name{color:var(--parchment);font-size:32px;letter-spacing:-.8px}
.gcard-desc{font-family:var(--f-italic);font-style:italic;font-size:14px;color:rgba(26,25,22,.54);line-height:1.75;margin:0;flex:1}
.gcard-feat .gcard-desc{color:rgba(242,237,227,.48)}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:4px}
.pill{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;white-space:nowrap;transition:transform .2s var(--ease)}

.pill-default{background:rgba(26,25,22,.06);border:1px solid rgba(26,25,22,.12);color:rgba(26,25,22,.58)}
.pill-rating{background:rgba(196,135,42,.10);border:1px solid rgba(196,135,42,.30);color:var(--oro)}
.pill-price{background:rgba(29,92,64,.07);border:1px solid rgba(29,92,64,.22);color:var(--verde)}
.pill-feat{background:rgba(242,237,227,.08);border:1px solid rgba(242,237,227,.18);color:rgba(242,237,227,.74)}
.pill-sponsor{background:rgba(196,135,42,.14);border:1px solid rgba(196,135,42,.40);color:var(--oro)}
.badge{
  position:absolute;top:0;right:20px;background:var(--verde);color:#fff;
  font-family:var(--f-ui);font-size:7px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;padding:5px 12px;border-radius:0 0 6px 6px;

/* FIX P1-UI-10: badge sin solapamiento con ícono — margin compensado */

.rcard-feat .rcard-content .rcard-top{padding-right:80px}

/* ── RESTO GRID ── */
.resto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(26,25,22,.10);border:1px solid rgba(26,25,22,.10)}
.rcard{
  background:#fff;display:flex;flex-direction:column;padding:32px 28px 28px;
  text-decoration:none;position:relative;overflow:hidden;min-height:180px;
  transition:background .4s var(--ease),transform .4s var(--ease),box-shadow .4s ease,opacity .3s ease;
  contain:layout style
}
.rcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--verde);transform:scaleX(0);transform-origin:left;transition:transform .35s var(--ease);z-index:0}
.rcard:hover::before,.rcard:focus-visible::before{transform:scaleX(1)}

/* Popularity bar */
.rcard-popularity{
  position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--verde),var(--oro2));
  transform-origin:left;transform:scaleX(0);
  transition:transform .9s var(--ease);z-index:5;border-radius:0
}
.rcard.visible .rcard-popularity{transform:scaleX(var(--pop-width,0))}

.rcard-feat{grid-column:span 2;background:var(--ink);color:var(--parchment);padding:44px 40px 38px;min-height:220px;position:relative;overflow:hidden}
.rcard-feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--verde) 0%,var(--oro) 55%,var(--verde2) 100%);z-index:2;width:100%;transition:none}
.rcard-feat::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 75% at 92% 18%,rgba(29,92,64,.30) 0%,transparent 58%),radial-gradient(ellipse 45% 55% at 8% 82%,rgba(196,135,42,.14) 0%,transparent 55%);pointer-events:none;z-index:1;transition:none}
.rcard-feat:hover{background:#1e1e1a;transform:translateY(-5px);box-shadow:0 28px 64px -10px rgba(6,6,5,.55)}
.rcard-shine{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);left:-100%;z-index:3;transition:left .7s var(--ease);pointer-events:none}
.rcard:hover .rcard-shine,.rcard-feat:hover .rcard-shine{left:100%}
.rcard-ad{
  background:rgba(232,226,213,.45);border:1px dashed rgba(26,25,22,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:12px;min-height:180px;
  transition:background .4s ease,border-color .4s ease,transform .4s var(--ease);padding:32px 24px
}
.rcard-ad:hover{background:rgba(29,92,64,.06);border-color:var(--verde);border-style:solid;transform:translateY(-4px)}
.rcard-ad-icon{font-size:28px;transition:transform .4s var(--ease-spring)}
.rcard-ad:hover .rcard-ad-icon{transform:scale(1.15) rotate(-8deg)}
.rcard-ad-title{font-family:var(--f-display);font-size:15px;color:var(--verde);font-style:italic}
.rcard-ad-sub{font-family:var(--f-italic);font-style:italic;font-size:12px;color:rgba(26,25,22,.48);line-height:1.6;max-width:140px}
.rcard-content{position:relative;z-index:2;display:flex;flex-direction:column;gap:13px;height:100%}
.rcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.rcard-open{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(29,92,64,.09);border:1px solid rgba(29,92,64,.25);border-radius:2px;
  color:var(--verde2);font-family:var(--f-ui);font-size:8px;font-weight:700;
  letter-spacing:1.8px;text-transform:uppercase;padding:5px 10px
}
.rcard-open.is-unverified{background:rgba(26,25,22,.05);border-color:rgba(26,25,22,.14);color:rgba(26,25,22,.42)}
.rcard-open-dot{width:5px;height:5px;background:var(--verde2);color:var(--verde2)}
.rcard-icon{font-size:34px;line-height:1;transition:transform .4s var(--ease-spring)}
.rcard:hover .rcard-icon{transform:scale(1.1)}
.rcard-feat .rcard-icon{font-size:48px}
.rcard-name{font-family:var(--f-display);font-size:20px;line-height:1.1;color:var(--ink);letter-spacing:-.3px;display:block;word-break:break-word}
.rcard-feat .rcard-name{color:var(--parchment);font-size:32px;letter-spacing:-.8px}
.rcard-desc{font-family:var(--f-italic);font-style:italic;font-size:14px;color:rgba(26,25,22,.54);line-height:1.75;margin:0;flex:1}
.rcard-feat .rcard-desc{color:rgba(242,237,227,.48)}
.rcard.mood-dim{opacity:.28;filter:saturate(.5)}
.rcard.mood-match{box-shadow:0 0 0 2px rgba(196,135,42,.60),0 20px 48px -10px rgba(6,6,5,.30)}

/* ── AD BANNER ── */
.ad-banner{
  display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:wrap;
  width:100%;box-sizing:border-box;background:var(--ink);border-left:5px solid var(--oro);
  padding:48px 52px;margin:90px 0;text-decoration:none;position:relative;overflow:hidden;
  transition:transform .4s var(--ease),box-shadow .4s ease;
  box-shadow:var(--shadow-lg)
}
.ad-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 85% at 92% 50%,rgba(29,92,64,.20) 0%,transparent 58%),radial-gradient(ellipse 40% 65% at 4% 50%,rgba(196,135,42,.10) 0%,transparent 55%);pointer-events:none}
.ad-banner:hover{transform:translateY(-3px);box-shadow:0 32px 80px -12px rgba(6,6,5,.60);border-left-color:var(--oro2)}

.ad-banner-icon{width:68px;height:68px;border-radius:3px;background:rgba(196,135,42,.12);border:1px solid rgba(196,135,42,.28);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;transition:transform .4s var(--ease-spring)}
.ad-banner:hover .ad-banner-icon{transform:scale(1.08) rotate(-4deg)}
.ad-banner-eyebrow{display:block;font-family:var(--f-ui);font-size:7px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(196,135,42,.68);margin-bottom:6px}

.ad-banner-sub{font-family:var(--f-italic);font-style:italic;font-size:14px;color:rgba(242,237,227,.42);line-height:1.7}
.ad-banner-btn{position:relative;z-index:1;flex-shrink:0;background:var(--oro);color:var(--ink);font-family:var(--f-ui);font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;padding:16px 36px;border-radius:2px;box-shadow:0 6px 24px rgba(196,135,42,.42);transition:background .35s ease,transform .35s var(--ease)}
.ad-banner:hover .ad-banner-btn{background:var(--oro2);transform:translateY(-3px)}

/* ── CAFÉ GRID ── */
.cafe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(26,25,22,.08);border:1px solid rgba(26,25,22,.08)}
.ccard{position:relative;height:240px;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;justify-content:flex-end;contain:layout style;transition:opacity .3s ease}
.ccard-bg{position:absolute;inset:0;transition:transform .65s var(--ease)}
.ccard:hover .ccard-bg{transform:scale(1.07)}
.ccard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,5,.97) 0%,rgba(6,6,5,.52) 45%,rgba(6,6,5,.04) 100%);transition:opacity .45s ease}
.ccard:hover .ccard-overlay{opacity:.85}
.ccard-inner{position:relative;z-index:2;padding:28px;display:flex;flex-direction:column;gap:6px;transition:transform .4s var(--ease)}
.ccard:hover .ccard-inner{transform:translateY(-6px)}
.ccard-label{font-family:var(--f-ui);font-size:7px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--oro2)}
.ccard-name{font-family:var(--f-display);font-style:italic;font-size:24px;line-height:1.05;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.92)}

.ccard:hover .ccard-border,.ccard:focus-visible .ccard-border{border-color:rgba(196,135,42,.45)}
.ccard-featured{grid-column:span 2;height:280px}
.ccard-featured .ccard-name{font-size:34px}
/* FIX P4-PE-04: imagen featured no debe ser lazy */
.ccard-featured .ccard-bg img{loading:eager}

/* ── BARES ── */
.bar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(26,25,22,.08);border:1px solid rgba(26,25,22,.08)}
.bcard{
  background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:48px 20px 40px;text-align:center;text-decoration:none;position:relative;
  overflow:hidden;min-height:165px;
  transition:background .4s var(--ease),transform .4s var(--ease),box-shadow .4s ease,opacity .3s ease;
  contain:layout style
}
.bcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:0;background:var(--verde);transition:height .35s var(--ease)}
.bcard:hover,.bcard:focus-visible{background:var(--parchment);transform:translateY(-6px);box-shadow:0 18px 44px -6px rgba(26,25,22,.16)}
.bcard:hover::after,.bcard:focus-visible::after{height:3px}
.bcard-icon{font-size:40px;line-height:1;transition:transform .4s var(--ease-spring);position:relative;z-index:1}

.bcard-name{font-family:var(--f-display);font-size:15px;color:var(--ink);line-height:1.3;word-break:break-word;position:relative;z-index:1}

/* ── LIST ITEMS ── */
.list-items{display:flex;flex-direction:column;gap:1px;background:rgba(26,25,22,.08);border:1px solid rgba(26,25,22,.08)}
.litem{
  background:#fff;display:flex;align-items:center;gap:24px;padding:28px 32px;
  text-decoration:none;position:relative;overflow:hidden;border-left:4px solid transparent;
  transition:background .35s ease,border-left-color .35s ease,transform .35s var(--ease),box-shadow .35s ease,opacity .3s ease;
  contain:layout style
}
.litem:hover,.litem:focus-visible{background:var(--parchment);border-left-color:var(--verde);transform:translateX(6px);box-shadow:-5px 0 24px -6px rgba(29,92,64,.25)}
.litem-icon{font-size:30px;flex-shrink:0;transition:transform .35s var(--ease-spring)}
.litem:hover .litem-icon{transform:scale(1.14) rotate(-4deg)}
.litem-name{font-family:var(--f-display);font-size:19px;color:var(--ink);flex:1;min-width:0;word-break:break-word;position:relative;z-index:1}
.litem-arrow{font-size:18px;color:rgba(26,25,22,.28);flex-shrink:0;transition:color .35s ease,transform .35s var(--ease);position:relative;z-index:1}
.litem:hover .litem-arrow{color:var(--verde);transform:translateX(8px)}

.uft-section-header-accent span:nth-child(3){display:block;width:12px;height:3px;background:var(--parchment2);opacity:.4}
.uft-eyebrow{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:#c0392b;display:block;margin-bottom:8px}
.uft-section-title{font-family:var(--f-display);font-size:clamp(24px,3.2vw,34px);font-weight:400;color:var(--ink);line-height:1;letter-spacing:-.5px}

.uft-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-xl)}
.uft-topbar{height:3px;width:100%;background:#5c0e08;overflow:hidden;flex-shrink:0;position:relative}

}
.uft-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 90% at 95% 50%,rgba(192,57,43,.14) 0%,transparent 62%),radial-gradient(ellipse 40% 70% at 5% 50%,rgba(196,135,42,.07) 0%,transparent 58%);pointer-events:none;z-index:0}

.uft-subtitle{font-family:var(--f-italic);font-style:italic;font-size:15px;color:rgba(242,237,227,.44);line-height:1.75}

.uft-vdivider{width:1px;height:80px;background:rgba(242,237,227,.09);margin:0 44px;flex-shrink:0}

/* ── SERVICIOS GRID COMPACTO — FIX P4-RE-01: breakpoints añadidos ── */
.servicios-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;background:rgba(26,25,22,.10);border:1px solid rgba(26,25,22,.10)
}
/* FIX P4-RE-01 crítico: media queries para el grid de servicios */
@media(max-width:860px){.servicios-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.servicios-grid{grid-template-columns:1fr}}

.servicio-card{
  background:var(--ink);display:flex;flex-direction:column;gap:10px;
  padding:26px 22px;text-decoration:none;position:relative;overflow:hidden;
  transition:background .35s ease,transform .4s var(--ease),box-shadow .4s ease
}
.servicio-card:hover{background:rgba(26,25,22,.85);transform:translateY(-3px);box-shadow:var(--shadow-md)}
.servicio-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent 60%);opacity:0;transition:opacity .3s ease}
.servicio-card:hover::before{opacity:1}
.servicio-card-icon{font-size:28px;line-height:1;transition:transform .4s var(--ease-spring)}
.servicio-card:hover .servicio-card-icon{transform:scale(1.14) rotate(-5deg)}
.servicio-card-title{font-family:var(--f-display);font-style:italic;font-size:17px;color:var(--parchment);line-height:1.1}
.servicio-card-sub{font-family:var(--f-ui);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(242,237,227,.32)}
.servicio-card-arrow{position:absolute;top:14px;right:14px;font-size:12px;color:rgba(242,237,227,.28);transition:color .3s ease,transform .3s var(--ease)}
.servicio-card:hover .servicio-card-arrow{color:var(--oro2);transform:translate(2px,-2px)}

/* Details accordion — FIX P2-UX-09: animación consistente */
.servicios-details{margin-top:1px}
.servicios-details summary{
  cursor:pointer;background:var(--ink);
  color:rgba(242,237,227,.58);font-family:var(--f-ui);font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;padding:18px 22px;list-style:none;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .3s ease,color .3s ease;border:none
}
.servicios-details summary::-webkit-details-marker{display:none}
.servicios-details summary:hover{background:rgba(26,25,22,.7);color:rgba(242,237,227,.82)}
.servicios-details summary::after{content:'▾';font-size:12px;transition:transform .3s var(--ease)}
.servicios-details[open] summary::after{transform:rotate(180deg)}
.servicios-details-body{
  background:rgba(6,6,5,.4);
  /* Animación de apertura para <details> — FIX P2-UX-09 */
  animation:detailsOpen .35s var(--ease) both
}
@keyframes detailsOpen{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── CANAL/WHATSAPP STRIP — T2-02: CTA de suscripción ── */
.channel-strip{
  display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
  background:linear-gradient(135deg,#128c7e 0%,#075e54 100%);
  padding:28px 44px;margin:0 0 72px 0;border-radius:3px;
  box-shadow:0 12px 40px rgba(7,94,84,.40);
  text-decoration:none;position:relative;overflow:hidden;
  transition:transform .35s var(--ease),box-shadow .35s ease
}
.channel-strip::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 90% 50%,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none}
.channel-strip:hover{transform:translateY(-3px);box-shadow:0 20px 56px rgba(7,94,84,.55)}
.channel-strip-left{display:flex;align-items:center;gap:18px;position:relative;z-index:1}
.channel-strip-icon{font-size:32px;line-height:1;transition:transform .35s var(--ease-spring)}
.channel-strip:hover .channel-strip-icon{transform:scale(1.15) rotate(-5deg)}
.channel-strip-text{display:flex;flex-direction:column;gap:4px}
.channel-strip-title{font-family:var(--f-display);font-style:italic;font-size:19px;color:#fff;line-height:1.1}
.channel-strip-sub{font-family:var(--f-ui);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.72)}
.channel-strip-btn{
  position:relative;z-index:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.30);
  color:#fff;font-family:var(--f-ui);font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;padding:13px 28px;border-radius:2px;white-space:nowrap;
  transition:background .3s ease,border-color .3s ease
}
.channel-strip:hover .channel-strip-btn{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.50)}
@media(max-width:640px){.channel-strip{padding:22px 20px;flex-direction:column;align-items:flex-start;gap:16px}.channel-strip-btn{align-self:stretch;text-align:center}}

/* ── FOOTER ── */

}

#lost-fab{
